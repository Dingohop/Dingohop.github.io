  <title id="title">Informational video portfolio preview</title>
  <desc id="desc">A modern purple editorial graphic for an informational video project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16081f"/>
